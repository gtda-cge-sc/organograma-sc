*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #edf1f7;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  color: #1a2a3a;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #0f2540 0%, #1a3a5c 60%, #1e4a75 100%);
  color: white;
  padding: 0 20px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  z-index: 10;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}

.sc-emblem {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.5px;
  flex-shrink: 0;
}

.header-text h1 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-text p {
  font-size: 10.5px;
  opacity: 0.55;
  margin-top: 1px;
  letter-spacing: 0.1px;
}

.search-wrap {
  position: relative;
  flex-shrink: 0;
}
#search {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px;
  padding: 6px 10px 6px 32px;
  color: white;
  font-family: inherit;
  font-size: 12.5px;
  width: 210px;
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}
#search::placeholder { color: rgba(255,255,255,0.4); }
#search:focus {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.35);
}
.search-ico {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  opacity: 0.5;
  pointer-events: none;
}

.btn-row { display: flex; gap: 5px; flex-shrink: 0; }
.btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px;
  color: white;
  font-family: inherit;
  font-size: 11.5px;
  font-weight: 400;
  padding: 5px 11px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
  line-height: 1;
}
.btn:hover { background: rgba(255,255,255,0.2); }
.btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Legend bar ── */
.legend-bar {
  background: white;
  border-bottom: 1px solid #d4dce8;
  padding: 0 20px;
  height: 36px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #5a6a7a; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
#node-count {
  margin-left: auto;
  font-size: 11px;
  color: #8a9aaa;
  font-style: italic;
}

/* ── Canvas ── */
#chart {
  flex: 1;
  overflow: hidden;
  cursor: grab;
  position: relative;
}
#chart:active { cursor: grabbing; }

/* SVG */
.grid-bg { stroke: #d4dce8; stroke-width: 0.5; opacity: 0.5; }
.link {
  fill: none;
  stroke: #b0c0d4;
  stroke-width: 1.5;
}
.link.faded { stroke-opacity: 0.15; }

.node { cursor: pointer; }
.node.dimmed { opacity: 0.15; }
.node.highlighted .node-body { filter: drop-shadow(0 0 6px rgba(251,191,36,0.9)); }

.node-body {
  transition: filter 0.2s;
}
.node:hover .node-body {
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.28));
}

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  background: #0f2540;
  color: white;
  padding: 9px 13px;
  border-radius: 7px;
  font-size: 12px;
  line-height: 1.5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  max-width: 300px;
  z-index: 999;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}
#tooltip.show { opacity: 1; }
#tooltip strong { display: block; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
#tooltip span { font-size: 11px; opacity: 0.72; }

/* ── Help text ── */
#hint {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-size: 11px;
  color: #8a9aaa;
  background: white;
  border: 1px solid #d4dce8;
  border-radius: 6px;
  padding: 6px 10px;
  pointer-events: none;
  line-height: 1.6;
}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="sc-emblem">SC</div>
    <div class="header-text">
      <h1>Organograma — Administração Pública Estadual Direta</h1>
      <p>Estado de Santa Catarina &nbsp;·&nbsp; Clique nos nós para expandir ou recolher</p>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar órgão ou sigla…" autocomplete="off" spellcheck="false">
  </div>

  <div class="btn-row">
    <button class="btn" onclick="expandAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      Expandir tudo
    </button>
    <button class="btn" onclick="collapseAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/>
      </svg>
      Recolher
    </button>
    <button class="btn" onclick="fitView()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Ajustar tela
    </button>
  </div>
</header>

<div class="legend-bar">
  <div class="leg"><div class="leg-dot" style="background:#1a3a5c"></div>Governo do Estado</div>
  <div class="leg"><div class="leg-dot" style="background:#2563a8"></div>Gabinetes e Órgãos</div>
  <div class="leg"><div class="leg-dot" style="background:#137a57"></div>Secretarias Vinculadas</div>
  <div class="leg"><div class="leg-dot" style="background:#b45309"></div>Sec. Executivas / Subordinadas</div>
  <div id="node-count"></div>
</div>

<div id="chart"></div>
<div id="tooltip"></div>
<div id="hint">
  🖱 Arraste para mover &nbsp;·&nbsp; Scroll para zoom<br>
  Clique num nó para expandir/recolher
</div>

<script>
/* ── Data ── */
const orgData = {
  name: "Administração Pública Estadual Direta",
  fullName: "Administração Pública Estadual Direta — Estado de Santa Catarina",
  sigla: "SC",
  children: [
    {
      name: "Gabinete do Governador", fullName: "Gabinete do Governador do Estado", sigla: "GGov",
      children: [
        { name: "Secretaria de Governo", fullName: "Secretaria de Governo", sigla: "SG" },
        {
          name: "Casa Civil", fullName: "Secretaria de Estado da Casa Civil", sigla: "SCC",
          children: [
            { name: "Art. Nacional", fullName: "Secretaria Executiva de Articulação Nacional", sigla: "SAN" },
            { name: "Art. Internacional", fullName: "Secretaria Executiva de Articulação Internacional", sigla: "SAI" },
            { name: "Casa Militar", fullName: "Secretaria da Casa Militar", sigla: "SCM" }
          ]
        },
        { name: "Procuradoria-Geral", fullName: "Procuradoria-Geral do Estado", sigla: "PGE" },
        { name: "Controladoria-Geral", fullName: "Controladoria-Geral do Estado", sigla: "CGE" },
        { name: "Conselho de Governo", fullName: "Conselho de Governo", sigla: "CG" }
      ]
    },
    { name: "Gabinete do Vice-Gov.", fullName: "Gabinete do Vice-Governador do Estado", sigla: "GVG" },
    { name: "Administração", fullName: "Secretaria de Estado da Administração", sigla: "SEA" },
    { name: "Justiça e Reint. Social", fullName: "Secretaria de Estado da Justiça e Reintegração Social", sigla: "SEJURI" },
    {
      name: "Agricultura e Pecuária", fullName: "Secretaria de Estado da Agricultura e Pecuária", sigla: "SAPE",
      children: [
        { name: "Aquicultura e Pesca", fullName: "Secretaria Executiva da Aquicultura e Pesca", sigla: "SAQ" }
      ]
    },
    { name: "Comunicação", fullName: "Secretaria de Estado da Comunicação", sigla: "SECOM" },
    { name: "Indústria, Comércio e Serv.", fullName: "Secretaria de Estado de Indústria, Comércio e Serviços", sigla: "SICOS" },
    { name: "Ciência, Tec. e Inovação", fullName: "Secretaria de Estado da Ciência, Tecnologia e Inovação", sigla: "SCTI" },
    { name: "Meio Ambiente", fullName: "Secretaria de Estado do Meio Ambiente e da Economia Verde", sigla: "SEMAE" },
    { name: "Assistência Social", fullName: "Secretaria de Estado da Assistência Social, Mulher e Família", sigla: "SAS" },
    { name: "Educação", fullName: "Secretaria de Estado da Educação", sigla: "SED" },
    {
      name: "Fazenda", fullName: "Secretaria de Estado da Fazenda", sigla: "SEF",
      children: [
        { name: "Grupo Gestor de Gov.", fullName: "Grupo Gestor de Governo", sigla: "GGG" }
      ]
    },
    { name: "Infraestrutura e Mobilidade", fullName: "Secretaria de Estado da Infraestrutura e Mobilidade", sigla: "SIE" },
    { name: "Portos, Aeroportos e Ferrov.", fullName: "Secretaria de Estado de Portos, Aeroportos e Ferrovias", sigla: "SPAF" },
    { name: "Saúde", fullName: "Secretaria de Estado da Saúde", sigla: "SES" },
    { name: "Proteção e Defesa Civil", fullName: "Secretaria de Estado da Proteção e Defesa Civil", sigla: "SDC" },
    { name: "Planejamento", fullName: "Secretaria de Estado do Planejamento", sigla: "SEPLAN" },
    {
      name: "Segurança Pública", fullName: "Secretaria de Estado da Segurança Pública", sigla: "SSP",
      children: [
        { name: "Polícia Militar", fullName: "Polícia Militar do Estado de Santa Catarina", sigla: "PMSC" },
        { name: "Polícia Civil", fullName: "Polícia Civil do Estado de Santa Catarina", sigla: "PCSC" },
        { name: "Corpo de Bombeiros", fullName: "Corpo de Bombeiros Militar do Estado de Santa Catarina", sigla: "CBMSC" },
        { name: "Polícia Científica", fullName: "Polícia Científica", sigla: "PCI" }
      ]
    },
    { name: "Turismo", fullName: "Secretaria de Estado do Turismo", sigla: "SETUR" }
  ]
};

/* ── Colors per depth ── */
const PALETTE = [
  { fill: '#1a3a5c', badge: '#0f2540', text: '#ffffff', stroke: '#0d1f35' },  // 0 root
  { fill: '#2563a8', badge: '#1a4a8a', text: '#ffffff', stroke: '#1a4a8a' },  // 1 gabinetes
  { fill: '#137a57', badge: '#0c5e42', text: '#ffffff', stroke: '#0c5e42' },  // 2 vinculadas
  { fill: '#b45309', badge: '#8a3e07', text: '#ffffff', stroke: '#8a3e07' },  // 3 subordinadas
];
const col = d => PALETTE[Math.min(d.depth, 3)];

/* ── Dimensions ── */
const NW = 148, NH = 50, NRX = 7;
const BADGE_H = 19;

/* ── SVG setup ── */
const container = document.getElementById('chart');
const tip = document.getElementById('tooltip');
let uidSeq = 0;

const svg = d3.select(container).append('svg')
  .attr('width', '100%')
  .attr('height', '100%')
  .style('display', 'block');

/* grid pattern */
const defs = svg.append('defs');
const pat = defs.append('pattern')
  .attr('id', 'grid').attr('width', 40).attr('height', 40)
  .attr('patternUnits', 'userSpaceOnUse');
pat.append('path').attr('d', 'M 40 0 L 0 0 0 40').attr('class', 'grid-bg').attr('fill', 'none');

svg.append('rect').attr('width', '100%').attr('height', '100%').attr('fill', 'url(#grid)');

const gMain = svg.append('g').attr('class', 'tree-root');

const zoomBeh = d3.zoom()
  .scaleExtent([0.05, 4])
  .on('zoom', e => gMain.attr('transform', e.transform));

svg.call(zoomBeh).on('dblclick.zoom', null);

const treeLayout = d3.tree().nodeSize([NW + 24, NH + 90]);

/* ── Hierarchy ── */
const root = d3.hierarchy(orgData);
root.each(d => { d.uid = ++uidSeq; });

/* collapse depth > 1 on load */
root.descendants().forEach(d => {
  if (d.depth > 1 && d.children) {
    d._children = d.children;
    d.children = null;
  }
});

/* ── Update ── */
function update(source, animate = true) {
  treeLayout(root);
  const DUR = animate ? 420 : 0;
  const nodes = root.descendants();
  const links = root.links();

  document.getElementById('node-count').textContent =
    `${nodes.length} órgão${nodes.length !== 1 ? 's' : ''} visível${nodes.length !== 1 ? 'is' : ''}`;

  /* Links */
  const linkSel = gMain.selectAll('.link').data(links, d => d.target.uid);

  const lkEnter = linkSel.enter().insert('path', 'g')
    .attr('class', 'link')
    .attr('d', () => bez({ x: source.x0 ?? source.x, y: source.y0 ?? source.y },
                          { x: source.x0 ?? source.x, y: source.y0 ?? source.y }));

  linkSel.merge(lkEnter)
    .transition().duration(DUR)
    .attr('d', d => bez(d.source, d.target));

  linkSel.exit()
    .transition().duration(DUR)
    .attr('d', () => bez({ x: source.x, y: source.y }, { x: source.x, y: source.y }))
    .remove();

  /* Nodes */
  const nodeSel = gMain.selectAll('.node').data(nodes, d => d.uid);

  const nkEnter = nodeSel.enter().append('g')
    .attr('class', 'node')
    .attr('transform', () => `translate(${source.x0 ?? source.x},${source.y0 ?? source.y})`)
    .style('opacity', 0)
    .on('click', (_, d) => {
      if (d.children) { d._children = d.children; d.children = null; }
      else if (d._children) { d.children = d._children; d._children = null; }
      update(d);
    })
    .on('mouseenter', (_, d) => {
      tip.innerHTML = `<strong>${d.data.sigla}</strong><span>${d.data.fullName || d.data.name}</span>`;
      tip.classList.add('show');
    })
    .on('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 38) + 'px';
    })
    .on('mouseleave', () => tip.classList.remove('show'));

  /* node body group */
  const bodyG = nkEnter.append('g').attr('class', 'node-body');

  /* shadow / main rect */
  bodyG.append('rect')
    .attr('class', 'node-shadow')
    .attr('width', NW).attr('height', NH)
    .attr('x', -NW/2).attr('y', -NH/2 + 2)
    .attr('rx', NRX)
    .attr('fill', 'rgba(0,0,0,0.18)')
    .attr('filter', 'blur(3px)');

  bodyG.append('rect')
    .attr('class', 'node-rect')
    .attr('width', NW).attr('height', NH)
    .attr('x', -NW/2).attr('y', -NH/2)
    .attr('rx', NRX)
    .attr('fill', d => col(d).fill)
    .attr('stroke', d => col(d).stroke)
    .attr('stroke-width', 1);

  /* badge strip */
  bodyG.append('rect')
    .attr('class', 'node-badge')
    .attr('width', NW - 2).attr('height', BADGE_H)
    .attr('x', -NW/2 + 1).attr('y', -NH/2 + 1)
    .attr('rx', NRX - 1)
    .attr('fill', d => col(d).badge);

  /* sigla */
  bodyG.append('text')
    .attr('x', 0).attr('y', -NH/2 + BADGE_H/2 + 1)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-family', "'IBM Plex Sans', sans-serif")
    .attr('font-size', '10px').attr('font-weight', '600')
    .attr('fill', 'rgba(255,255,255,0.88)')
    .attr('letter-spacing', '0.6px')
    .text(d => d.data.sigla);

  /* name */
  const nameAreaCY = -NH/2 + BADGE_H + (NH - BADGE_H) / 2;
  bodyG.append('text')
    .attr('class', 'node-name')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'central')
    .attr('font-family', "'IBM Plex Sans', sans-serif")
    .attr('font-size', '9.5px').attr('font-weight', '400')
    .attr('fill', 'rgba(255,255,255,0.82)')
    .each(function(d) {
      const label = d.data.name;
      const el = d3.select(this);
      const maxW = NW - 12;
      const charPx = 5.4; // approx char width at 9.5px
      const maxCh = Math.floor(maxW / charPx);

      if (label.length <= maxCh) {
        el.attr('y', nameAreaCY).text(label);
      } else {
        // split into two lines
        const words = label.split(' ');
        let l1 = '', l2 = '';
        let pivot = Math.ceil(words.length / 2);
        l1 = words.slice(0, pivot).join(' ');
        l2 = words.slice(pivot).join(' ');
        if (l1.length > maxCh) l1 = l1.slice(0, maxCh - 1) + '…';
        if (l2.length > maxCh) l2 = l2.slice(0, maxCh - 1) + '…';
        el.attr('y', 0);
        el.append('tspan').attr('x', 0).attr('y', nameAreaCY - 6).text(l1);
        el.append('tspan').attr('x', 0).attr('y', nameAreaCY + 6).text(l2);
      }
    });

  /* expand/collapse indicator dot */
  nkEnter.append('circle')
    .attr('class', 'toggle-dot')
    .attr('cx', 0).attr('cy', NH/2 + 7)
    .attr('r', 5)
    .attr('stroke', d => col(d).fill)
    .attr('stroke-width', 1.5);

  /* merge + transition */
  const nodeMerge = nodeSel.merge(nkEnter);
  nodeMerge.transition().duration(DUR)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('opacity', 1);

  /* update toggle dot */
  nodeMerge.select('.toggle-dot')
    .attr('fill', d => {
      if (d._children) return '#fbbf24';
      if (d.children && d.depth > 0) return 'rgba(255,255,255,0.5)';
      return 'transparent';
    })
    .attr('stroke', d => (d._children || (d.children && d.depth > 0)) ? col(d).fill : 'none');

  /* exit */
  nodeSel.exit()
    .transition().duration(DUR)
    .attr('transform', `translate(${source.x},${source.y})`)
    .style('opacity', 0)
    .remove();

  /* save prev positions */
  root.each(d => { d.x0 = d.x; d.y0 = d.y; });
}

/* ── Bezier connector (top-down) ── */
function bez(s, t) {
  const my = (s.y + t.y) / 2;
  return `M${s.x},${s.y} C${s.x},${my} ${t.x},${my} ${t.x},${t.y}`;
}

/* ── Controls ── */
function fitView() {
  const bb = gMain.node().getBBox();
  if (!bb.width || !bb.height) return;
  const W = container.clientWidth, H = container.clientHeight;
  const pad = 60;
  const scale = Math.min((W - pad * 2) / bb.width, (H - pad * 2) / bb.height, 1.5);
  const tx = W / 2 - scale * (bb.x + bb.width / 2);
  const ty = H / 2 - scale * (bb.y + bb.height / 2);
  svg.transition().duration(650).ease(d3.easeCubicInOut)
    .call(zoomBeh.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function expandAll() {
  root.each(d => {
    if (d._children) { d.children = d._children; d._children = null; }
  });
  update(root);
  setTimeout(fitView, 450);
}

function collapseAll() {
  root.each(d => {
    if (d.depth > 0 && d.children) { d._children = d.children; d.children = null; }
  });
  update(root);
  setTimeout(fitView, 450);
}

/* ── Search ── */
function allNodes(node) {
  // Traverses visible AND collapsed nodes (children + _children)
  const result = [node];
  const kids = node.children || node._children || [];
  kids.forEach(c => result.push(...allNodes(c)));
  return result;
}

document.getElementById('search').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    gMain.selectAll('.node').classed('dimmed', false).classed('highlighted', false);
    gMain.selectAll('.link').classed('faded', false);
    return;
  }

  const matchIds  = new Set();
  const directHit = new Set();
  let needUpdate  = false;

  allNodes(root).forEach(d => {
    const hit = d.data.name.toLowerCase().includes(q)
      || d.data.sigla.toLowerCase().includes(q)
      || (d.data.fullName || '').toLowerCase().includes(q);

    if (hit) {
      matchIds.add(d.uid);
      directHit.add(d.uid);

      // Expand collapsed ancestors so the result becomes visible
      let anc = d.parent;
      while (anc) {
        matchIds.add(anc.uid);
        if (!anc.children && anc._children) {
          anc.children  = anc._children;
          anc._children = null;
          needUpdate    = true;
        }
        anc = anc.parent;
      }
    }
  });

  // Re-render the tree if any ancestor was expanded
  if (needUpdate) update(root);

  // Apply highlight/dim after animation completes
  const applyClasses = () => {
    gMain.selectAll('.node').each(function(d) {
      const match = matchIds.has(d.uid);
      d3.select(this)
        .classed('dimmed',      !match)
        .classed('highlighted',  match && directHit.has(d.uid));
    });
    gMain.selectAll('.link').classed('faded', d => !matchIds.has(d.target.uid));
  };

  needUpdate ? setTimeout(applyClasses, 450) : applyClasses();
});

/* ── Init ── */
root.x0 = 0; root.y0 = 0;
update(root, false);
setTimeout(fitView, 80);
</script>
</body>
</html>
